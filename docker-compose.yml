services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      APP_NAME: Cartlex
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      PORT: "8080"
    volumes:
      - ./database/database.sqlite:/var/www/html/database/database.sqlite
      - ./storage/app/public:/var/www/html/storage/app/public
