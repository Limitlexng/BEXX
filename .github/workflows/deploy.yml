name: Deploy to Shared Hosting

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo, pdo_sqlite, mbstring, zip, gd
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Build frontend assets
        run: npm ci && npm run build

      - name: Create deployment archive
        run: |
          tar -czf cartlex_deploy.tar.gz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='*.log' \
            .

      - name: Upload archive via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          source: "cartlex_deploy.tar.gz"
          target: "~/"

      - name: Run remote setup
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          script: |
            set -e
            APP_DIR="$HOME/cartlex_app"
            PUBLIC_HTML="$HOME/public_html"
            DOMAIN="${{ secrets.DOMAIN }}"
            APP_URL="https://$DOMAIN"

            # Extract deployment archive
            mkdir -p "$APP_DIR"
            tar -xzf ~/cartlex_deploy.tar.gz -C "$APP_DIR"
            rm ~/cartlex_deploy.tar.gz

            cd "$APP_DIR"

            # Write .env on first deploy only
            if [ ! -f .env ]; then
              printf 'APP_NAME="Cartlex Fleet Portal"\n' > .env
              printf 'APP_ENV=production\n' >> .env
              printf 'APP_KEY=\n' >> .env
              printf 'APP_DEBUG=false\n' >> .env
              printf "APP_URL=%s\n" "$APP_URL" >> .env
              printf 'APP_LOCALE=en\n' >> .env
              printf '\n' >> .env
              printf 'DB_CONNECTION=sqlite\n' >> .env
              printf "DB_DATABASE=%s/database/database.sqlite\n" "$APP_DIR" >> .env
              printf '\n' >> .env
              printf 'SESSION_DRIVER=file\n' >> .env
              printf 'CACHE_STORE=file\n' >> .env
              printf 'QUEUE_CONNECTION=sync\n' >> .env
              printf 'FILESYSTEM_DISK=local\n' >> .env
              printf '\n' >> .env
              printf 'LOG_CHANNEL=single\n' >> .env
              printf 'LOG_LEVEL=error\n' >> .env
              printf '\n' >> .env
              printf 'MAIL_MAILER=log\n' >> .env
              printf 'MAIL_FROM_ADDRESS="noreply@gocartlex.com"\n' >> .env
              printf 'MAIL_FROM_NAME="Cartlex"\n' >> .env
              php artisan key:generate --force
            fi

            # Database
            touch database/database.sqlite
            chmod 664 database/database.sqlite
            chmod -R 775 storage bootstrap/cache

            # Migrations
            php artisan migrate --force --no-interaction

            # Seed once
            USER_COUNT=$(php artisan tinker --execute="echo App\Models\User::count();" 2>/dev/null | grep -o '[0-9]*' | tail -1)
            if [ -z "$USER_COUNT" ] || [ "$USER_COUNT" = "0" ]; then
              php artisan db:seed --force --no-interaction
            fi

            # Production caches
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan storage:link --force 2>/dev/null || true

            # ── Wire up public_html ──
            # Use PHP to patch index.php (avoids shell escaping issues)
            php -r "
              \$src  = file_get_contents('${APP_DIR}/public/index.php');
              \$from = [\"__DIR__.'/../vendor/autoload.php'\", \"__DIR__.'/../bootstrap/app.php'\", \"__DIR__.'/../storage/framework/maintenance.php'\"];
              \$to   = [\"'${APP_DIR}/vendor/autoload.php'\", \"'${APP_DIR}/bootstrap/app.php'\", \"'${APP_DIR}/storage/framework/maintenance.php'\"];
              file_put_contents('${PUBLIC_HTML}/index.php', str_replace(\$from, \$to, \$src));
              echo 'index.php patched\n';
            "

            # .htaccess
            cp public/.htaccess "$PUBLIC_HTML/.htaccess" 2>/dev/null || true

            # Copy built assets (no rsync needed — cp works everywhere)
            cp -rf public/build "$PUBLIC_HTML/"

            # Public storage files
            if [ -d storage/app/public ]; then
              cp -rf storage/app/public "$PUBLIC_HTML/storage"
            fi

            echo "Deploy complete at $APP_URL"
