name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo, pdo_sqlite, mbstring, zip, gd
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Install JS dependencies & build
        run: npm ci && npm run build

      - name: Setup environment
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite

      - name: Run migrations & seed
        run: php artisan migrate --force --seed --no-interaction

      - name: Run tests
        run: php artisan test --no-ansi

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cartlex-fleet-portal .

      - name: Smoke test container
        run: |
          docker run -d \
            --name cartlex-test \
            -e APP_NAME=Cartlex \
            -e APP_ENV=production \
            -e APP_DEBUG=false \
            -e PORT=8080 \
            -p 8080:8080 \
            cartlex-fleet-portal

          # Wait for server to start
          sleep 15

          # Check the homepage responds
          curl -f http://localhost:8080 || (docker logs cartlex-test && exit 1)

          docker stop cartlex-test
